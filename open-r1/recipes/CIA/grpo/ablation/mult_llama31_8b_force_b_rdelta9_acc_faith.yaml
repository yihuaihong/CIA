# CIA GRPO — Mult, Llama-3.1-8B-Instruct, force_b prompt with STRICT probe (rdelta9).
# Conservative hparams vs Qwen: lr halved (5e-7 vs 1e-6), beta doubled (0.20 vs 0.10)
# to suppress KL drift seen on Gemma. Variant: acc_faith.
model_name_or_path: ${SCRATCH}/transformers/Llama-3.1-8B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: sdpa

dataset_name: ${SCRATCH}/open-r1/datasets/Mult2d_cia_Llama-3.1-8B-Instruct_force_b_rdelta9_strict
dataset_config: default
dataset_prompt_column: problem
dataset_train_split: train
dataset_test_split: validation

reward_funcs:
  - multiplication_accuracy
  - multiplication_parametric_faithfulness_probe_selfcon
reward_weights:
  - 2.0
  - 1.0

num_generations: 8
temperature: 1.0
top_p: 1.0
beta: 0.20
epsilon: 0.2
learning_rate: 5.0e-07
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.1
num_train_epochs: 2
max_steps: 120
max_prompt_length: 1024
max_completion_length: 512

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
bf16: true
use_liger_kernel: false
optim: adamw_bnb_8bit

use_vllm: false

log_completions: true
log_level: info
logging_first_step: true
logging_steps: 5
logging_strategy: steps
save_strategy: steps
save_steps: 30
save_total_limit: 2
output_dir: ${SCRATCH}/open-r1/cia/mult_llama31_8b_force_b_rdelta9_acc_faith
overwrite_output_dir: true
push_to_hub: false
report_to:
  - wandb
wandb_project: cia-grpo-ablation
wandb_run_name: mult-llama31-8b-force-b-rdelta9-acc-faith
seed: 42
do_eval: false
eval_strategy: 'no'
per_device_eval_batch_size: 2
